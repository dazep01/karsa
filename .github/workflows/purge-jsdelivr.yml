# ============================================================================
#  KARSA — jsDelivr Cache Purge Action
# ----------------------------------------------------------------------------
#  Otomatis refresh cache semua link jsDelivr di repo.
#
#  Trigger:
#    1. Push ke main (setelah merge PR / release)
#    2. Manual dispatch (workflow_dispatch) — bisa pilih versi target
#
#  Cara kerja:
#    - Memindai seluruh file di repo untuk link cdn.jsdelivr.net
#    - Bangun path jsDelivr (format gh/) berdasarkan versi dari package.json
#    - Panggil jsDelivr Purge API (format: {"path": ["/gh/..."]})
#    - Rate limit ~1 req/detik
# ============================================================================

name: 🔄 Purge jsDelivr Cache

on:
  push:
    branches: [main]
    paths:
      # Hanya jalankan jika file yang relevan berubah
      - 'engine/**'
      - 'lexer/**'
      - 'parser/**'
      - 'resolver/**'
      - 'analyzer/**'
      - 'compiler/**'
      - 'package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versi target (kosongkan = ambil dari package.json)'
        required: false
        default: ''
      purge_all_tags:
        description: 'Purge semua tag yang pernah ada? (true/false)'
        required: false
        default: 'false'
      extra_paths:
        description: 'Path tambahan (pisah koma, mis: /engine/karsa.js,/engine/karsa.standalone.js)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  purge-jsdelivr:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ambil semua tag untuk purge_all_tags

      # ── Setup Node ───────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Scan & Purge ─────────────────────────────────────────────────────
      - name: 🔍 Scan & 🔄 Purge jsDelivr Cache
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          PURGE_ALL_TAGS: ${{ github.event.inputs.purge_all_tags }}
          EXTRA_PATHS: ${{ github.event.inputs.extra_paths }}
        run: |
          set -e

          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║        🔄 KARSA — jsDelivr Cache Purge                     ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          # ── 1. Ambil versi dari package.json ──────────────────────────────
          PKG_VERSION=$(node -p "require('./package.json').version")
          VERSION="${INPUT_VERSION:-$PKG_VERSION}"
          REPO="dazep01/karsa"
          PKG_NAME=$(node -p "require('./package.json').name")

          echo "📌 Versi target: $VERSION"
          echo "📌 Repo:        $REPO"
          echo "📌 Package:     $PKG_NAME"
          echo ""

          # ── 2. Cek apakah package ada di npm ──────────────────────────────
          NPM_EXISTS=false
          NPM_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://data.jsdelivr.com/v1/packages/npm/${PKG_NAME}")
          if [ "$NPM_STATUS" -ge 200 ] && [ "$NPM_STATUS" -lt 300 ]; then
            NPM_EXISTS=true
            echo "📦 Package ditemukan di npm — akan purge format npm/ juga"
          else
            echo "📦 Package TIDAK ditemukan di npm — hanya purge format gh/"
          fi

          # ── 3. Kumpulkan semua link jsDelivr dari repo ────────────────────
          # Array untuk menyimpan path jsDelivr (tanpa domain, format: /gh/... atau /npm/...)
          PATHS=()

          echo "🔍 Memindai file untuk link jsDelivr..."
          # Excluding .github/workflows/ agar tidak menangkap template string YAML
          while IFS= read -r link; do
            if [ -n "$link" ]; then
              # Konversi full URL ke path format jsDelivr
              # https://cdn.jsdelivr.net/gh/... → /gh/...
              # https://cdn.jsdelivr.net/npm/... → /npm/...
              path="${link#https://cdn.jsdelivr.net}"
              # Abaikan jika masih mengandung template variable ($ atau ${)
              if echo "$path" | grep -qE '\$|\{'; then
                echo "   ↳ Diabaikan (template variable): $path"
                continue
              fi
              PATHS+=("$path")
              echo "   ↳ Ditemukan: $path"
            fi
          done < <(grep -roh 'https://cdn\.jsdelivr\.net/[^"'"'"' )>`]*' . \
            --exclude-dir=.git \
            --exclude-dir=.github/workflows \
            --include="*.md" --include="*.html" --include="*.js" \
            --include="*.json" --include="*.txt" 2>/dev/null | sort -u)

          echo "   ↳ Ditemukan ${#PATHS[@]} link dari scan file"
          echo ""

          # ── 4. Bangun path-path berdasarkan versi ─────────────────────────
          # Path file utama KARSA yang biasanya diakses via CDN
          KNOWN_FILES=(
            "/engine/karsa.js"
            "/engine/karsa-cli.js"
            "/engine/karsa.standalone.js"
            "/lexer/karsa-lexer.js"
            "/parser/karsa-parser.js"
            "/resolver/karsa-resolver.js"
            "/analyzer/karsa-analyzer.js"
            "/compiler/karsa-compiler.js"
          )

          # Format gh: /gh/dazep01/karsa@VERSION/path
          for F in "${KNOWN_FILES[@]}"; do
            PATHS+=("/gh/${REPO}@${VERSION}${F}")
          done

          # Format npm: /npm/karsa@VERSION/path (hanya jika package ada di npm)
          if [ "$NPM_EXISTS" = true ]; then
            for F in "${KNOWN_FILES[@]}"; do
              PATHS+=("/npm/${PKG_NAME}@${VERSION}${F}")
            done
          fi

          # ── 5. Tambahkan extra paths dari input ──────────────────────────
          if [ -n "$EXTRA_PATHS" ]; then
            echo "📋 Menambahkan extra paths dari input..."
            IFS=',' read -ra EXTRA <<< "$EXTRA_PATHS"
            for F in "${EXTRA[@]}"; do
              F=$(echo "$F" | xargs)  # trim whitespace
              if [ -n "$F" ]; then
                PATHS+=("/gh/${REPO}@${VERSION}${F}")
                if [ "$NPM_EXISTS" = true ]; then
                  PATHS+=("/npm/${PKG_NAME}@${VERSION}${F}")
                fi
                echo "   ↳ $F"
              fi
            done
          fi

          # ── 6. Purge semua tag jika diminta ───────────────────────────────
          if [ "$PURGE_ALL_TAGS" = "true" ]; then
            echo "🏷️  Memindai semua git tag untuk purge..."
            TAGS=$(git tag -l 2>/dev/null || echo "")
            if [ -n "$TAGS" ]; then
              while IFS= read -r TAG; do
                if [ -n "$TAG" ]; then
                  for F in "${KNOWN_FILES[@]}"; do
                    PATHS+=("/gh/${REPO}@${TAG}${F}")
                  done
                  if [ "$NPM_EXISTS" = true ]; then
                    for F in "${KNOWN_FILES[@]}"; do
                      PATHS+=("/npm/${PKG_NAME}@${TAG}${F}")
                    done
                  fi
                  echo "   ↳ Tag: $TAG"
                fi
              done <<< "$TAGS"
            else
              echo "   ↳ Tidak ada tag ditemukan"
            fi
          fi

          # ── 7. Deduplikasi path ───────────────────────────────────────────
          UNIQUE_PATHS=()
          declare -A SEEN
          for P in "${PATHS[@]}"; do
            if [ -z "${SEEN[$P]}" ]; then
              SEEN[$P]=1
              UNIQUE_PATHS+=("$P")
            fi
          done

          echo ""
          echo "📊 Total path unik untuk di-purge: ${#UNIQUE_PATHS[@]}"
          echo ""

          # ── 8. Purge via jsDelivr API ─────────────────────────────────────
          # jsDelivr Purge API format: {"path": ["/gh/owner/repo@version/file"]}
          # Bisa kirim banyak path sekaligus dalam satu request
          echo "🔄 Memulai purge..."

          SUCCESS=0
          FAIL=0
          BATCH_SIZE=50  # jsDelivr mendukung banyak path per request

          # Proses dalam batch
          for ((i=0; i<${#UNIQUE_PATHS[@]}; i+=BATCH_SIZE)); do
            BATCH=()
            for ((j=i; j<i+BATCH_SIZE && j<${#UNIQUE_PATHS[@]}; j++)); do
              BATCH+=("\"${UNIQUE_PATHS[$j]}\"")
            done

            # Bangun JSON array untuk path
            PATH_JSON=$(IFS=,; echo "[${BATCH[*]}]")

            echo "   ↳ Batch $((i/BATCH_SIZE + 1)): ${#BATCH[@]} path"

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://purge.jsdelivr.net/" \
              -H "Content-Type: application/json" \
              -d "{\"path\": ${PATH_JSON}}" \
              --max-time 30)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "     ✅ Berhasil ($HTTP_CODE)"
              SUCCESS=$((SUCCESS + ${#BATCH[@]}))
            else
              echo "     ❌ Gagal ($HTTP_CODE): $BODY"
              FAIL=$((FAIL + ${#BATCH[@]}))
            fi

            # Rate limit: jsDelivr mengizinkan ~5 req/detik, tapi kita amankan
            sleep 1
          done

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  ✅ Berhasil: $SUCCESS                                        "
          echo "║  ❌ Gagal:    $FAIL                                           "
          echo "║  📊 Total:    ${#UNIQUE_PATHS[@]}                                         "
          echo "╚══════════════════════════════════════════════════════════════╝"

          # Jika terlalu banyak gagal, return error
          if [ $FAIL -gt 0 ] && [ $FAIL -gt $((SUCCESS / 2)) ]; then
            echo "⚠️  Terlalu banyak gagal, mungkin ada masalah dengan API"
            exit 1
          fi

      # ── Summary ───────────────────────────────────────────────────────────
      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🔄 jsDelivr Cache Purge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Nilai |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          VERSION=$(node -p "require('./package.json').version")
          echo "| Versi | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | \`dazep01/karsa\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "| Versi Input | \`${{ github.event.inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Cache jsDelivr telah di-refresh untuk versi **${VERSION}**" >> $GITHUB_STEP_SUMMARY
